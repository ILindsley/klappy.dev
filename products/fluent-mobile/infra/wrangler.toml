# Fluent Mobile — Lane-Level Wrangler Config
#
# This is the shared Cloudflare Pages configuration for the fluent-mobile lane.
# Attempts should copy this to their folder if they need to deploy.
#
# Pattern:
# 1. Attempt copies this file to their attempt folder
# 2. Attempt modifies if needed (e.g., different project name for testing)
# 3. If improvements are made, merge back to lane level
# 4. Next attempt starts from improved config

name = "fluent-mobile-poc"
compatibility_date = "2024-01-01"

[site]
bucket = "./src"
