<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>klappy.dev — Thinking Space</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <!-- Main thinking space -->
    <main class="thinking-space">
      <div class="conversation" id="conversation">
        <!-- Initial companion message -->
        <div class="message companion">
          <p>What's on your mind?</p>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <textarea
          id="user-input"
          placeholder="Write freely. Nothing is committed until you say so."
          rows="3"
        ></textarea>
        <button id="send-btn" class="send-btn" disabled>Send</button>
      </div>
    </main>

    <!-- Artifact drawer (dormant until first artifact) -->
    <aside class="artifact-drawer hidden" id="artifact-drawer">
      <div class="drawer-header">
        <h2>Your Artifacts</h2>
        <button id="export-btn" class="export-btn">Export & Leave</button>
      </div>
      <div class="artifact-list" id="artifact-list"></div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
